service:
  type: NodePort

adminPassword: admin123

persistence:
  enabled: true
  size: 1Gi
  storageClassName: standard

initChownData:
  enabled: false

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.monitoring.svc.cluster.local
        isDefault: true

assertNoLeakedSecrets: false

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: Telnet App
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

dashboards:
  default:
    backend-monitoring:
      json: |
        {
          "title": "Backend Monitoring",
          "tags": ["telnet", "backend", "kubernetes"],
          "timezone": "browser",
          "refresh": "10s",
          "time": { "from": "now-30m", "to": "now" },
          "schemaVersion": 38,
          "panels": [
            {
              "id": 1,
              "type": "stat",
              "title": "Replicas actifs (HPA)",
              "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
              "datasource": "Prometheus",
              "targets": [{ "expr": "kube_deployment_status_replicas_available{namespace=\"telnet-app\", deployment=\"backend\"}", "legendFormat": "Replicas" }],
              "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": 1 }, { "color": "yellow", "value": 3 }, { "color": "red", "value": 5 }] } } }
            },
            {
              "id": 2,
              "type": "stat",
              "title": "CPU moyen (%)",
              "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
              "datasource": "Prometheus",
              "targets": [{ "expr": "avg(sum by (pod) (rate(container_cpu_usage_seconds_total{pod=~\"backend.*\", namespace=\"telnet-app\"}[2m]))) * 100", "legendFormat": "CPU %" }],
              "fieldConfig": { "defaults": { "unit": "percent", "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 50 }, { "color": "red", "value": 70 }] } } }
            },
            {
              "id": 3,
              "type": "stat",
              "title": "WebSocket actifs",
              "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 },
              "datasource": "Prometheus",
              "targets": [{ "expr": "sum(websocket_active_connections{namespace=\"telnet-app\"})", "legendFormat": "Connexions WS" }],
              "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 10 }] } } }
            },
            {
              "id": 4,
              "type": "stat",
              "title": "Tests Telnet lances",
              "gridPos": { "h": 4, "w": 4, "x": 12, "y": 0 },
              "datasource": "Prometheus",
              "targets": [{ "expr": "sum(telnet_tests_launched_total)", "legendFormat": "Tests" }],
              "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "blue", "value": 0 }] } } }
            },
            {
              "id": 5,
              "type": "stat",
              "title": "Requetes HTTP/sec",
              "gridPos": { "h": 4, "w": 4, "x": 16, "y": 0 },
              "datasource": "Prometheus",
              "targets": [{ "expr": "sum(rate(http_requests_total[2m]))", "legendFormat": "req/s" }],
              "fieldConfig": { "defaults": { "unit": "reqps", "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": 0 }] } } }
            },
            {
              "id": 6,
              "type": "stat",
              "title": "Latence p95 (ms)",
              "gridPos": { "h": 4, "w": 4, "x": 20, "y": 0 },
              "datasource": "Prometheus",
              "targets": [{ "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[2m])) by (le)) * 1000", "legendFormat": "p95" }],
              "fieldConfig": { "defaults": { "unit": "ms", "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": 0 }, { "color": "yellow", "value": 200 }, { "color": "red", "value": 500 }] } } }
            },
            {
              "id": 7,
              "type": "timeseries",
              "title": "CPU Usage (%)",
              "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
              "datasource": "Prometheus",
              "targets": [{ "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{pod=~\"backend.*\", namespace=\"telnet-app\"}[2m])) * 100", "legendFormat": "{{pod}}" }],
              "fieldConfig": { "defaults": { "unit": "percent", "color": { "mode": "palette-classic" } } }
            },
            {
              "id": 8,
              "type": "timeseries",
              "title": "Memoire utilisee (MB)",
              "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
              "datasource": "Prometheus",
              "targets": [{ "expr": "sum by (pod) (container_memory_working_set_bytes{pod=~\"backend.*\", namespace=\"telnet-app\"}) / 1024 / 1024", "legendFormat": "{{pod}}" }],
              "fieldConfig": { "defaults": { "unit": "mbytes", "color": { "mode": "palette-classic" } } }
            },
            {
              "id": 9,
              "type": "timeseries",
              "title": "Requetes HTTP par route",
              "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
              "datasource": "Prometheus",
              "targets": [{ "expr": "sum(rate(http_requests_total[2m])) by (route, method)", "legendFormat": "{{method}} {{route}}" }],
              "fieldConfig": { "defaults": { "unit": "reqps", "color": { "mode": "palette-classic" } } }
            },
            {
              "id": 10,
              "type": "timeseries",
              "title": "Latence HTTP (p50 / p95 / p99)",
              "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
              "datasource": "Prometheus",
              "targets": [
                { "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket[2m])) by (le)) * 1000", "legendFormat": "p50" },
                { "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[2m])) by (le)) * 1000", "legendFormat": "p95" },
                { "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket[2m])) by (le)) * 1000", "legendFormat": "p99" }
              ],
              "fieldConfig": { "defaults": { "unit": "ms", "color": { "mode": "palette-classic" } } }
            },
            {
              "id": 11,
              "type": "timeseries",
              "title": "Node.js Heap Memory (MB)",
              "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
              "datasource": "Prometheus",
              "targets": [
                { "expr": "nodejs_heap_size_used_bytes / 1024 / 1024", "legendFormat": "Heap used" },
                { "expr": "nodejs_heap_size_total_bytes / 1024 / 1024", "legendFormat": "Heap total" }
              ],
              "fieldConfig": { "defaults": { "unit": "mbytes", "color": { "mode": "palette-classic" } } }
            },
            {
              "id": 12,
              "type": "timeseries",
              "title": "Restarts pods backend",
              "gridPos": { "h": 8, "w": 12, "x": 12, "y": 20 },
              "datasource": "Prometheus",
              "targets": [{ "expr": "kube_pod_container_status_restarts_total{namespace=\"telnet-app\", container=\"backend\"}", "legendFormat": "{{pod}}" }],
              "fieldConfig": { "defaults": { "color": { "mode": "palette-classic" } } }
            }
          ]
        }

grafana.ini:
  smtp:
    enabled: true
    host: smtp.gmail.com:587
    user: ademhmerchaaa@gmail.com
    password: INJECTED_BY_PIPELINE
    from_address: ademhmerchaaa@gmail.com
    from_name: "Grafana - Telnet Monitor"
    startTLS_policy: MandatoryStartTLS
  unified_alerting:
    enabled: true

# Go template syntax below is escaped with {{ "{{" }} / {{ "}}" }} so Helm's tpl
# function passes the braces through literally to Grafana at runtime.
alerting:
  notification-templates.yaml:
    apiVersion: 1
    templates:
      - name: telnet-alert-email
        template: |
          {{ "{{" }} define "telnet-alert-email" {{ "}}" }}
          <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f1f5f9;padding:24px 16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;">
            <tr><td align="center">
              <table width="600" cellpadding="0" cellspacing="0" border="0" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.09);">
                <tr>
                  <td style="background:#991B1B;padding:30px 36px 26px;">
                    <p style="margin:0 0 8px;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.55);">TELNET MONITOR &nbsp;&middot;&nbsp; KUBERNETES ALERTING</p>
                    <h1 style="margin:0;font-size:22px;font-weight:700;color:#ffffff;line-height:1.3;">&#9888; &nbsp;CPU Usage Critical</h1>
                  </td>
                </tr>
                <tr>
                  <td style="background:#FEF2F2;padding:14px 36px;border-left:4px solid #B91C1C;border-bottom:1px solid #FECACA;">
                    <p style="margin:0;font-size:13px;color:#991B1B;font-weight:600;">{{ "{{" }} .CommonAnnotations.summary {{ "}}" }}</p>
                  </td>
                </tr>
                <tr>
                  <td style="padding:32px 36px 28px;">
                    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#FFF7F7;border:1px solid #FECACA;border-radius:8px;margin-bottom:28px;">
                      <tr>
                        <td style="padding:18px 22px;">
                          <p style="margin:0 0 6px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#9CA3AF;">Contexte</p>
                          <p style="margin:0;font-size:14px;color:#374151;line-height:1.6;">{{ "{{" }} .CommonAnnotations.description {{ "}}" }}</p>
                        </td>
                      </tr>
                    </table>
                    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
                      <tr>
                        <td style="padding:12px 0;border-bottom:1px solid #F3F4F6;width:40%;font-size:13px;color:#6B7280;font-weight:500;">Namespace</td>
                        <td style="padding:12px 0;border-bottom:1px solid #F3F4F6;font-size:13px;color:#111827;font-weight:600;">telnet-app</td>
                      </tr>
                      <tr>
                        <td style="padding:12px 0;border-bottom:1px solid #F3F4F6;font-size:13px;color:#6B7280;font-weight:500;">Environnement</td>
                        <td style="padding:12px 0;border-bottom:1px solid #F3F4F6;font-size:13px;color:#111827;font-weight:600;">Kubernetes / Minikube</td>
                      </tr>
                      <tr>
                        <td style="padding:12px 0;border-bottom:1px solid #F3F4F6;font-size:13px;color:#6B7280;font-weight:500;">S&eacute;v&eacute;rit&eacute;</td>
                        <td style="padding:12px 0;border-bottom:1px solid #F3F4F6;font-size:13px;font-weight:700;color:#B91C1C;">&#128308; &nbsp;CRITICAL</td>
                      </tr>
                      <tr>
                        <td style="padding:12px 0;border-bottom:1px solid #F3F4F6;font-size:13px;color:#6B7280;font-weight:500;">Alertes actives</td>
                        <td style="padding:12px 0;border-bottom:1px solid #F3F4F6;font-size:13px;color:#111827;font-weight:600;">{{ "{{" }} len .Alerts {{ "}}" }}</td>
                      </tr>
                      <tr>
                        <td style="padding:12px 0;font-size:13px;color:#6B7280;font-weight:500;">D&eacute;clenchement</td>
                        <td style="padding:12px 0;font-size:13px;color:#111827;font-weight:600;">{{ "{{" }} (index .Alerts 0).StartsAt {{ "}}" }}</td>
                      </tr>
                    </table>
                    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-top:32px;">
                      <tr>
                        <td>
                          <a href="{{ "{{" }} .ExternalURL {{ "}}" }}" style="display:inline-block;background:#B91C1C;color:#ffffff;text-decoration:none;padding:14px 32px;border-radius:8px;font-size:14px;font-weight:700;letter-spacing:0.3px;">Voir le Dashboard Grafana &nbsp;&#8594;</a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
                <tr>
                  <td style="background:#F8FAFC;border-top:1px solid #F1F5F9;padding:18px 36px;">
                    <p style="margin:0;font-size:11px;color:#94A3B8;line-height:1.7;">
                      Grafana Alerting &nbsp;&middot;&nbsp; Telnet Monitor &nbsp;&middot;&nbsp; Kubernetes &nbsp;&nbsp;|&nbsp;&nbsp;
                      <a href="{{ "{{" }} .ExternalURL {{ "}}" }}/alerting" style="color:#94A3B8;text-decoration:underline;">G&eacute;rer les alertes</a>
                    </p>
                  </td>
                </tr>
              </table>
            </td></tr>
          </table>
          {{ "{{" }} end {{ "}}" }}

  contactpoints.yaml:
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: email-telnet-monitor
        receivers:
          - uid: telnet-cpu-email-uid
            type: email
            settings:
              addresses: ademhmerchaaa@gmail.com
              subject: >-
                [Telnet Monitor] CPU Usage Critical — {{ "{{" }} .CommonAnnotations.summary {{ "}}" }}
              message: |
                {{ "{{" }} template "telnet-alert-email" . {{ "}}" }}
            disableResolveMessage: false
