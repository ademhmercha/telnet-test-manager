apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-seed
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-mongodb
          image: mongo:7
          imagePullPolicy: IfNotPresent
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MONGO_URI
          command:
            - sh
            - -c
            - |
              until mongosh "$MONGO_URI" --eval "db.adminCommand('ping')" --quiet 2>/dev/null; do
                echo "Waiting for MongoDB auth..."; sleep 3
              done
              echo "MongoDB ready."
      containers:
        - name: seed
          image: mongo:7
          envFrom:
            - secretRef:
                name: app-secrets
          command: ["/bin/sh", "-c"]
          args:
            - |
              mongosh "$MONGO_URI" --eval "
                var count = db.users.countDocuments();
                if (count === 0) {
                  try { db.users.dropIndex('id_1'); } catch(e) {}
                  db.users.insertMany([
                    {
                      id: 1,
                      username: 'admin',
                      password: '\$2a\$10\$DoBVgZewn/WJbXDJjjNkUuA.ie5KqyiyibNOHf..ZaGBiFcSG/41m',
                      role: 'admin',
                      email: 'admin@telnet.com',
                      statut: 'actif',
                      permissions: ['read','write','delete','admin','audit','manage_users','view_logs','run_tests'],
                      totalTimeMinutes: 0
                    },
                    {
                      id: 2,
                      username: 'engineer',
                      password: '\$2a\$10\$AQZFp38jGIfjXKEN7FTzp.FDe2R95AcO3b.BXvf.DUwT8QJcObe2e',
                      role: 'engineer',
                      email: 'engineer@telnet.com',
                      statut: 'actif',
                      permissions: ['read','write','delete','run_tests'],
                      totalTimeMinutes: 0
                    },
                    {
                      id: 3,
                      username: 'technician',
                      password: '\$2a\$10\$AQZFp38jGIfjXKEN7FTzp.FDe2R95AcO3b.BXvf.DUwT8QJcObe2e',
                      role: 'technician',
                      email: 'technician@telnet.com',
                      statut: 'actif',
                      permissions: ['read','run_tests'],
                      totalTimeMinutes: 0
                    }
                  ]);
                  print('Seeded ' + db.users.countDocuments() + ' users.');
                } else {
                  print('Already seeded: ' + count + ' users found, skipping.');
                }
              "
