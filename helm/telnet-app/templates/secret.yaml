apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  MONGO_URI: {{ .Values.secrets.mongodbUri | quote }}
  MONGO_INITDB_ROOT_USERNAME: {{ .Values.secrets.mongoRootUsername | quote }}
  MONGO_INITDB_ROOT_PASSWORD: {{ .Values.secrets.mongoRootPassword | quote }}
