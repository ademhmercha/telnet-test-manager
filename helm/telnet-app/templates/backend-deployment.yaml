apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount.backend }}
  progressDeadlineSeconds: 840
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-mongodb
          image: busybox
          command: ['sh', '-c', 'until nc -z mongodb-service {{ .Values.service.mongodb.port }}; do echo waiting for mongodb; sleep 2; done']
      containers:
        - name: backend
          image: "{{ .Values.image.backend.name }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.backend.port }}
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          volumeMounts:
            - name: reports-storage
              mountPath: /app/reports
          resources:
            requests:
              memory: {{ .Values.resources.backend.requests.memory | quote }}
              cpu: {{ .Values.resources.backend.requests.cpu | quote }}
            limits:
              memory: {{ .Values.resources.backend.limits.memory | quote }}
              cpu: {{ .Values.resources.backend.limits.cpu | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.backend.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: reports-storage
          persistentVolumeClaim:
            claimName: backend-pvc
