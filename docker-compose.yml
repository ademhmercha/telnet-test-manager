services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: telnet-db
    networks:
      - telnet-network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "3002:3002"
      - "3003:3003"
    environment:
      MONGO_URI: mongodb://admin:admin123@mongodb:27017/telnet-db?authSource=admin
      JWT_SECRET: telnet-jwt-secret-2024
      PORT: "3002"
      ALLOWED_ORIGIN: "http://localhost:3000,http://localhost:4000,http://localhost:8080,http://localhost:5050"
    volumes:
      - ./backend/reports:/app/reports
    depends_on:
      - mongodb
    networks:
      - telnet-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - telnet-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - telnet-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./monitoring/grafana-dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/telnet-monitoring.json
    depends_on:
      - prometheus
    networks:
      - telnet-network
    restart: unless-stopped

volumes:
  mongo-data:
  prometheus-data:
  grafana-data:

networks:
  telnet-network:
    driver: bridge
