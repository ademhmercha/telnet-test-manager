name: CI/CD Telnet Test Manager

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npm audit --audit-level=critical
      - run: cd backend && npm test --if-present
      - run: docker build -t telnet-backend:${{ github.sha }} ./backend

  ci-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm audit --audit-level=critical
      - run: cd frontend && npm run build
        env:
          CI: false
      - run: docker build -t telnet-frontend:${{ github.sha }} ./frontend

  deploy:
    needs: [ci-backend, ci-frontend]
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Start Minikube if stopped
        shell: powershell
        run: |
          $status = minikube status 2>$null
          if ($status -notmatch 'host: Running') {
            Write-Host "Minikube not running - starting..."
            minikube start --driver=docker
          } else {
            Write-Host "Minikube already running."
          }

      - name: Configure kubectl context
        shell: powershell
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          minikube update-context
          kubectl config use-context minikube
          kubectl cluster-info

      - name: Build images in Minikube
        shell: powershell
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          minikube docker-env --shell powershell | Where-Object { $_ -match '^\$Env:' } | Invoke-Expression
          docker build -t telnet-backend:latest ./backend
          docker build -t telnet-frontend:latest ./frontend

      - name: Fix ingress webhook if broken
        shell: powershell
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          kubectl delete validatingwebhookconfiguration ingress-nginx-admission --ignore-not-found
          Write-Host "Ingress webhook cleared."

      - name: Deploy with Helm
        id: deploy
        shell: powershell
        env:
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          helm upgrade --install telnet-app ./helm/telnet-app `
            --create-namespace `
            --namespace telnet-app `
            --set replicaCount.backend=1 `
            --set secrets.mongoRootUsername="$env:MONGO_USERNAME" `
            --set secrets.mongoRootPassword="$env:MONGO_PASSWORD" `
            --set secrets.mongodbUri="$env:MONGO_URI" `
            --set secrets.jwtSecret="$env:JWT_SECRET" `
            --timeout 600s

      - name: Rollback on failure
        if: failure() && steps.deploy.conclusion == 'failure'
        shell: powershell
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          Write-Host "Deploy failed - rolling back to previous version..."
          helm rollback telnet-app 0 --namespace telnet-app
          if (-not $?) { Write-Host "No previous version to rollback to." }

      - name: Install monitoring stack
        shell: powershell
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update
          helm upgrade --install prometheus prometheus-community/prometheus `
            -n monitoring --create-namespace `
            -f monitoring/prometheus-values.yaml `
            --timeout 180s
          helm upgrade --install grafana grafana/grafana `
            -n monitoring `
            -f monitoring/grafana-values.yaml `
            --timeout 180s

      - name: Force rollout restart to pick up new images
        shell: powershell
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          kubectl rollout restart deployment/frontend -n telnet-app
          kubectl rollout restart deployment/backend  -n telnet-app

      - name: Wait for deployments
        shell: powershell
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          kubectl wait --for=condition=available deployment/mongodb  -n telnet-app  --timeout=180s
          kubectl wait --for=condition=available deployment/backend  -n telnet-app  --timeout=240s
          kubectl wait --for=condition=available deployment/frontend -n telnet-app  --timeout=180s
          kubectl wait --for=condition=available deployment/grafana         -n monitoring --timeout=180s
          kubectl wait --for=condition=available deployment/prometheus-server -n monitoring --timeout=180s

      - name: Show pods and services
        shell: powershell
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          kubectl get pods -n telnet-app -o wide
          kubectl get svc  -n telnet-app
          kubectl get pods -n monitoring

      - name: Backend logs
        shell: powershell
        continue-on-error: true
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          $pod = kubectl get pods -n telnet-app -l app=backend --field-selector=status.phase=Running -o jsonpath="{.items[0].metadata.name}" 2>$null
          if ($pod) { kubectl logs -n telnet-app $pod -c backend --tail=30 }
          else { Write-Host "No running backend pod yet." }

      - name: Write job summary
        shell: powershell
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          $summary = $env:GITHUB_STEP_SUMMARY
          Add-Content $summary "## Deploiement Telnet Test Manager"
          Add-Content $summary ""
          Add-Content $summary "| Champ | Valeur |"
          Add-Content $summary "|---|---|"
          Add-Content $summary "| Commit | ``${{ github.sha }}`` |"
          Add-Content $summary "| Branche | ``${{ github.ref_name }}`` |"
          Add-Content $summary "| Heure | $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC') |"
          Add-Content $summary ""
          Add-Content $summary "### Deployments - telnet-app"
          Add-Content $summary "| NAME | READY | UP-TO-DATE | AVAILABLE | AGE |"
          Add-Content $summary "|---|---|---|---|---|"
          kubectl get deployments -n telnet-app --no-headers 2>$null | ForEach-Object {
            $cols = $_ -split '\s+'
            Add-Content $summary "| $($cols[0]) | $($cols[1]) | $($cols[2]) | $($cols[3]) | $($cols[4]) |"
          }
          Add-Content $summary ""
          Add-Content $summary "### Deployments - monitoring"
          Add-Content $summary "| NAME | READY | UP-TO-DATE | AVAILABLE | AGE |"
          Add-Content $summary "|---|---|---|---|---|"
          kubectl get deployments -n monitoring --no-headers 2>$null | ForEach-Object {
            $cols = $_ -split '\s+'
            Add-Content $summary "| $($cols[0]) | $($cols[1]) | $($cols[2]) | $($cols[3]) | $($cols[4]) |"
          }
