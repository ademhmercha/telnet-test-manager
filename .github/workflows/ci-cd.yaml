name: CI/CD Telnet Test Manager

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npm audit --audit-level=critical
      - run: cd backend && npm test --if-present

  ci-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm audit --audit-level=critical
      - run: cd frontend && npm run build
        env:
          CI: false

  deploy:
    needs: [ci-backend, ci-frontend]
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Start Docker and Minikube if stopped
        shell: powershell
        run: |
          $dockerInfo = docker info 2>&1 | Out-String
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Demarrage Docker Desktop..."
            Start-Process "C:\Program Files\Docker\Docker\Docker Desktop.exe"
            $timeout = 120; $elapsed = 0
            while ($elapsed -lt $timeout) {
              Start-Sleep 5; $elapsed += 5
              $check = docker info 2>&1 | Out-String
              if ($LASTEXITCODE -eq 0) { Write-Host "Docker pret (${elapsed}s)."; break }
            }
            if ($LASTEXITCODE -ne 0) { Write-Error "Docker n'a pas demarre."; exit 1 }
          } else { Write-Host "Docker deja en cours." }
          $status = minikube status 2>&1 | Out-String
          if ($status -notmatch 'host: Running') {
            Write-Host "Demarrage Minikube..."
            minikube start --driver=docker
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Reseau Docker corrompu - suppression et recreation..."
              minikube delete
              minikube start --driver=docker
              if ($LASTEXITCODE -ne 0) { Write-Error "Minikube ne demarre pas."; exit 1 }
            }
          } else { Write-Host "Minikube deja en cours." }

      - name: Configure kubectl context
        shell: powershell
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          kubectl config use-context minikube
          kubectl cluster-info

      - name: Build images in Minikube
        shell: powershell
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          minikube docker-env --shell powershell | Where-Object { $_ -match '^\$Env:' } | Invoke-Expression
          docker pull mongo:7
          docker build --build-arg CACHEBUST=${{ github.sha }} -t telnet-backend:latest ./backend
          docker build --build-arg CACHEBUST=${{ github.sha }} -t telnet-frontend:latest ./frontend

      - name: Fix ingress webhook if broken
        shell: powershell
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          kubectl delete validatingwebhookconfiguration ingress-nginx-admission --ignore-not-found
          Write-Host "Ingress webhook cleared."

      - name: Deploy with Helm
        id: deploy
        shell: powershell
        env:
          MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
          MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          helm upgrade --install telnet-app ./helm/telnet-app `
            --create-namespace `
            --namespace telnet-app `
            --set secrets.mongoRootUsername="$env:MONGO_USERNAME" `
            --set secrets.mongoRootPassword="$env:MONGO_PASSWORD" `
            --set secrets.mongodbUri="$env:MONGO_URI" `
            --set secrets.jwtSecret="$env:JWT_SECRET" `
            --no-hooks `
            --timeout 900s

      - name: Debug - inspect backend pod
        shell: powershell
        continue-on-error: true
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          Write-Host "=== TOUS LES PODS ==="
          kubectl get pods -n telnet-app -o wide
          Write-Host "=== LOGS BACKEND ==="
          $pod = kubectl get pods -n telnet-app -l app=backend -o jsonpath="{.items[0].metadata.name}" 2>&1
          if ($pod -and $pod -notmatch 'Error') {
            kubectl logs -n telnet-app $pod --all-containers --tail=80
            Write-Host "=== DESCRIBE BACKEND POD ==="
            kubectl describe pod -n telnet-app $pod
          }
          Write-Host "=== LOGS MONGODB ==="
          $mpod = kubectl get pods -n telnet-app -l app=mongodb -o jsonpath="{.items[0].metadata.name}" 2>&1
          if ($mpod -and $mpod -notmatch 'Error') {
            kubectl logs -n telnet-app $mpod --tail=30
          }

      - name: Install monitoring stack
        shell: powershell
        env:
          GRAFANA_SMTP_PASSWORD: ${{ secrets.GRAFANA_SMTP_PASSWORD }}
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          helm repo update
          helm upgrade --install prometheus prometheus-community/prometheus `
            -n monitoring --create-namespace `
            -f monitoring/prometheus-values.yaml `
            --timeout 180s
          helm upgrade --install grafana grafana/grafana `
            -n monitoring `
            -f monitoring/grafana-values.yaml `
            --set "grafana\.ini.smtp.password=$env:GRAFANA_SMTP_PASSWORD" `
            --timeout 180s

      - name: Force rollout restart to pick up new images
        shell: powershell
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          kubectl rollout restart deployment/frontend -n telnet-app
          kubectl rollout restart deployment/backend  -n telnet-app

      - name: Wait for deployments
        shell: powershell
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          kubectl wait --for=condition=available deployment/mongodb  -n telnet-app  --timeout=180s
          kubectl wait --for=condition=available deployment/backend  -n telnet-app  --timeout=240s
          kubectl wait --for=condition=available deployment/frontend -n telnet-app  --timeout=180s
          kubectl wait --for=condition=available deployment/grafana         -n monitoring --timeout=180s
          kubectl wait --for=condition=available deployment/prometheus-server -n monitoring --timeout=180s

      - name: Show pods and services
        shell: powershell
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          kubectl get pods -n telnet-app -o wide
          kubectl get svc  -n telnet-app
          kubectl get pods -n monitoring

      - name: Show app URL
        shell: powershell
        run: |
          Write-Host "========================================="
          Write-Host "kubectl port-forward svc/frontend-service 4000:80 -n telnet-app"
          Write-Host "Then open: http://localhost:4000"
          Write-Host "========================================="
          $summary = $env:GITHUB_STEP_SUMMARY
          Add-Content $summary "### Acces a l'application"
          Add-Content $summary '```'
          Add-Content $summary "kubectl port-forward svc/frontend-service 4000:80 -n telnet-app"
          Add-Content $summary '```'
          Add-Content $summary "Ouvrir : http://localhost:4000"

      - name: Backend logs
        shell: powershell
        continue-on-error: true
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          $pod = kubectl get pods -n telnet-app -l app=backend --field-selector=status.phase=Running -o jsonpath="{.items[0].metadata.name}" 2>$null
          if ($pod) { kubectl logs -n telnet-app $pod -c backend --tail=30 }
          else { Write-Host "No running backend pod yet." }

      - name: Write job summary
        shell: powershell
        run: |
          $env:KUBECONFIG = "$env:USERPROFILE\.kube\config"
          $summary = $env:GITHUB_STEP_SUMMARY
          Add-Content $summary "## Deploiement Telnet Test Manager"
          Add-Content $summary ""
          Add-Content $summary "| Champ | Valeur |"
          Add-Content $summary "|---|---|"
          Add-Content $summary "| Commit | ``${{ github.sha }}`` |"
          Add-Content $summary "| Branche | ``${{ github.ref_name }}`` |"
          Add-Content $summary "| Heure | $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC') |"
          Add-Content $summary ""
          Add-Content $summary "### Deployments - telnet-app"
          Add-Content $summary "| NAME | READY | UP-TO-DATE | AVAILABLE | AGE |"
          Add-Content $summary "|---|---|---|---|---|"
          kubectl get deployments -n telnet-app --no-headers 2>$null | ForEach-Object {
            $cols = $_ -split '\s+'
            Add-Content $summary "| $($cols[0]) | $($cols[1]) | $($cols[2]) | $($cols[3]) | $($cols[4]) |"
          }
          Add-Content $summary ""
          Add-Content $summary "### Deployments - monitoring"
          Add-Content $summary "| NAME | READY | UP-TO-DATE | AVAILABLE | AGE |"
          Add-Content $summary "|---|---|---|---|---|"
          kubectl get deployments -n monitoring --no-headers 2>$null | ForEach-Object {
            $cols = $_ -split '\s+'
            Add-Content $summary "| $($cols[0]) | $($cols[1]) | $($cols[2]) | $($cols[3]) | $($cols[4]) |"
          }
