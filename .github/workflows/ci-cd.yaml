name: CI/CD Telnet Test Manager

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npm audit --audit-level=critical
      - run: cd backend && npm test --if-present
      - run: docker build -t telnet-backend:${{ github.sha }} ./backend

  ci-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm audit --audit-level=critical
      - run: cd frontend && npm run build
        env:
          CI: false
      - run: docker build -t telnet-frontend:${{ github.sha }} ./frontend

  deploy:
    needs: [ci-backend, ci-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: medyagh/setup-minikube@master
        with:
          driver: docker
      - run: minikube addons enable ingress
      - run: |
          eval $(minikube docker-env)
          docker build -t telnet-backend:latest ./backend
          docker build -t telnet-frontend:latest ./frontend
      - name: Deploy with Helm
        id: deploy
        run: |
          helm upgrade --install telnet-app ./helm/telnet-app \
            --create-namespace \
            --namespace telnet-app \
            --timeout 600s
      - name: Rollback on failure
        if: failure() && steps.deploy.conclusion == 'failure'
        run: |
          echo "Deploy failed — rolling back to previous version..."
          helm rollback telnet-app 0 --namespace telnet-app || echo "No previous version to rollback to."
          echo "Done."
      - run: kubectl get all -n telnet-app
      - run: kubectl wait --for=condition=available deployment/frontend -n telnet-app --timeout=120s || true
      - run: kubectl wait --for=condition=available deployment/backend -n telnet-app --timeout=120s || true
      - run: kubectl wait --for=condition=available deployment/mongodb -n telnet-app --timeout=120s || true
      - run: kubectl get pods -n telnet-app
      - name: Add Helm repos for monitoring
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update
      - name: Install Prometheus
        run: |
          helm upgrade --install prometheus prometheus-community/prometheus \
            -n monitoring --create-namespace \
            -f monitoring/prometheus-values.yaml \
            --timeout 180s
      - name: Install Grafana
        run: |
          helm upgrade --install grafana grafana/grafana \
            -n monitoring \
            -f monitoring/grafana-values.yaml \
            --timeout 180s
      - name: Verify monitoring pods
        run: kubectl get pods -n monitoring
