name: CI/CD Telnet Test Manager

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npm audit --audit-level=critical
      - run: cd backend && npm test --if-present
      - run: docker build -t telnet-backend:${{ github.sha }} ./backend

  ci-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm audit --audit-level=critical
      - run: cd frontend && npm run build
        env:
          CI: false
      - run: docker build -t telnet-frontend:${{ github.sha }} ./frontend

  deploy:
    needs: [ci-backend, ci-frontend]
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build images in Minikube
        run: |
          eval $(minikube docker-env)
          docker build -t telnet-backend:latest ./backend
          docker build -t telnet-frontend:latest ./frontend

      - name: Deploy with Helm
        id: deploy
        run: |
          helm upgrade --install telnet-app ./helm/telnet-app \
            --create-namespace \
            --namespace telnet-app \
            --set replicaCount.backend=1 \
            --timeout 600s

      - name: Rollback on failure
        if: failure() && steps.deploy.conclusion == 'failure'
        run: |
          echo "Deploy failed — rolling back to previous version..."
          helm rollback telnet-app 0 --namespace telnet-app || echo "No previous version to rollback to."

      - name: Install monitoring stack
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update
          helm upgrade --install prometheus prometheus-community/prometheus \
            -n monitoring --create-namespace \
            -f monitoring/prometheus-values.yaml \
            --timeout 180s
          helm upgrade --install grafana grafana/grafana \
            -n monitoring \
            -f monitoring/grafana-values.yaml \
            --timeout 180s

      - name: Wait for deployments
        run: |
          kubectl wait --for=condition=available deployment/mongodb  -n telnet-app  --timeout=180s || true
          kubectl wait --for=condition=available deployment/backend  -n telnet-app  --timeout=240s || true
          kubectl wait --for=condition=available deployment/frontend -n telnet-app  --timeout=180s || true
          kubectl wait --for=condition=available deployment/grafana                  -n monitoring --timeout=180s || true
          kubectl wait --for=condition=available deployment/prometheus-server        -n monitoring --timeout=180s || true

      - name: Show pods and services
        run: |
          kubectl get pods -n telnet-app -o wide
          kubectl get svc  -n telnet-app
          kubectl get pods -n monitoring

      - name: Backend logs
        run: kubectl logs -n telnet-app -l app=backend --tail=30 || true

      - name: Write job summary
        run: |
          echo "## Déploiement Telnet Test Manager" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Champ | Valeur |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branche | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Heure | $(date '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployments — telnet-app" >> $GITHUB_STEP_SUMMARY
          echo "| NAME | READY | UP-TO-DATE | AVAILABLE | AGE |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
          kubectl get deployments -n telnet-app --no-headers 2>/dev/null \
            | awk '{print "| "$1" | "$2" | "$3" | "$4" | "$5" |"}' >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployments — monitoring" >> $GITHUB_STEP_SUMMARY
          echo "| NAME | READY | UP-TO-DATE | AVAILABLE | AGE |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
          kubectl get deployments -n monitoring --no-headers 2>/dev/null \
            | awk '{print "| "$1" | "$2" | "$3" | "$4" | "$5" |"}' >> $GITHUB_STEP_SUMMARY || true
